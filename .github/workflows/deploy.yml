name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://www.laundryandco.nyc' }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1  # Closest to NYC

      # Sync assets with long-lived cache (content-hashed filenames)
      - name: Upload static assets (long cache)
        run: |
          aws s3 sync out/ s3://${{ vars.S3_BUCKET_NAME }}/ \
            --exclude "*.html" \
            --exclude "sitemap.xml" \
            --exclude "robots.txt" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      # Sync HTML / sitemap / robots with short cache
      - name: Upload HTML & SEO files (short cache)
        run: |
          aws s3 sync out/ s3://${{ vars.S3_BUCKET_NAME }}/ \
            --exclude "*" \
            --include "*.html" \
            --include "sitemap.xml" \
            --include "robots.txt" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type-auto \

      # Invalidate CloudFront so visitors get fresh HTML immediately
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
